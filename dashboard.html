<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<style>
body {
  font-family: Poppins;
  background: #f4f4f4;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin: 10px auto;
  border-radius: 10px;
  max-width: 600px;
}

.hidden { display: none; }

input, select {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

button {
  padding: 10px;
  margin-top: 5px;
  cursor: pointer;
  width: 100%;
}
</style>
</head>

<body>

<h2>Dashboard</h2>

<!-- SUPERUSER -->
<div id="superuserPanel" class="card hidden">
  <h3>Superuser Panel</h3>

  <input id="su_username" placeholder="Username">
  <input id="su_email" placeholder="Email">
  <input id="su_password" placeholder="Password">

  <select id="su_role">
    <option value="user">User</option>
    <option value="admin">Admin</option>
  </select>

  <button onclick="buatUser()">Buat User</button>

  <div id="userList"></div>
</div>

<!-- UNDANGAN -->
<div class="card">
  <h3>Editor Undangan</h3>

  <input id="pria" placeholder="Nama Pria">
  <input id="wanita" placeholder="Nama Wanita">
  <input id="tanggal" type="date">
  <input id="lokasi" placeholder="Lokasi">

  <input id="tamu" placeholder="Nama Tamu (opsional)">

  <label>Background Video</label>
  <input type="file" id="bgFile">

  <label>Gallery 1</label>
  <input type="file" id="gallery1File">

  <label>Gallery 2</label>
  <input type="file" id="gallery2File">

  <button onclick="simpan()">Simpan</button>

  <p id="hasil"></p>
</div>

<div class="card">
  <h3>Daftar Undangan</h3>
  <div id="list"></div>
</div>

<script type="module">
import { auth, db, register, uploadFile } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  getDoc,
  updateDoc,
  doc,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

let editId = null;
let currentRole = null;
let currentData = null;

// 🔐 AUTH CHECK (ANTI BLANK)
onAuthStateChanged(auth, async (user) => {

  console.log("Auth:", user);

  try {

    if (!user) {
      alert("Silakan login terlebih dahulu");
      window.location.href = "login.html";
      return;
    }

    let role = "user";

    try {
      const snap = await getDoc(doc(db, "users", user.uid));

      if (snap.exists()) {
        role = snap.data().role;
      } else {
        console.warn("User tidak ada di Firestore");
      }

    } catch (e) {
      console.error("Error ambil role:", e);
    }

    console.log("ROLE:", role);

    if (role !== "superuser" && role !== "admin") {
      alert("Akses ditolak");
      window.location.href = "index.html";
      return;
    }

    currentRole = role;

    if (role === "superuser") {
      document.getElementById("superuserPanel").classList.remove("hidden");
      loadUsers();
    }

    loadInvitations();

  } catch (e) {
    console.error("FATAL:", e);
  }
});

// 🔥 CREATE USER
window.buatUser = async function () {
  try {
    await register(
      su_username.value,
      su_email.value,
      su_password.value,
      su_role.value
    );
    alert("User berhasil dibuat");
  } catch (e) {
    alert(e.message);
  }
};

// 🔥 LOAD USERS
function loadUsers() {
  const el = document.getElementById("userList");

  onSnapshot(collection(db, "users"), (snap) => {
    el.innerHTML = "";

    snap.forEach(doc => {
      const d = doc.data();
      el.innerHTML += `<div>${d.username} (${d.role})</div>`;
    });
  });
}

// 💍 SIMPAN
window.simpan = async function () {

  const user = auth.currentUser;

  let bgUrl = currentData?.background || "";
  let g1 = currentData?.gallery?.[0] || "";
  let g2 = currentData?.gallery?.[1] || "";

  if (bgFile.files[0]) {
    bgUrl = await uploadFile(bgFile.files[0], "bg/" + Date.now());
  }

  if (gallery1File.files[0]) {
    g1 = await uploadFile(gallery1File.files[0], "gallery/" + Date.now());
  }

  if (gallery2File.files[0]) {
    g2 = await uploadFile(gallery2File.files[0], "gallery/" + Date.now());
  }

  const tamuValue = document.getElementById("tamu").value;

  const data = {
    userId: user.uid,
    pria: pria.value,
    wanita: wanita.value,
    tanggal: tanggal.value,
    lokasi: lokasi.value,
    background: bgUrl,
    gallery: [g1, g2],
    tamu: tamuValue
  };

  if (!data.pria || !data.wanita || !data.tanggal) {
    alert("Isi data wajib");
    return;
  }

  if (editId) {
    await updateDoc(doc(db, "invitations", editId), data);
    alert("Updated");
  } else {
    const docRef = await addDoc(collection(db, "invitations"), data);

    hasil.innerText =
      "Link: invitation.html?id=" + docRef.id +
      "&to=" + encodeURIComponent(tamuValue || "Tamu Undangan");

    alert("Created");
  }

  resetForm();
  loadInvitations();
};

// 📊 LOAD UNDANGAN
async function loadInvitations() {

  const list = document.getElementById("list");
  list.innerHTML = "";

  let q;

  if (currentRole === "superuser") {
    q = collection(db, "invitations");
  } else {
    q = query(
      collection(db, "invitations"),
      where("userId", "==", auth.currentUser.uid)
    );
  }

  const snap = await getDocs(q);

  snap.forEach(docSnap => {
    const d = docSnap.data();

    list.innerHTML += `
      <div style="border-top:1px solid #eee;padding:10px 0;">
        <b>${d.pria} & ${d.wanita}</b><br>
        ${d.tanggal}<br>
        Tamu: ${d.tamu || "-"}<br>

        <button onclick="edit('${docSnap.id}')">Edit</button>
      </div>
    `;
  });
}

// ✏️ EDIT
window.edit = async function (id) {

  editId = id;

  const snap = await getDoc(doc(db, "invitations", id));
  const d = snap.data();

  currentData = d;

  pria.value = d.pria;
  wanita.value = d.wanita;
  tanggal.value = d.tanggal;
  lokasi.value = d.lokasi || "";
  tamu.value = d.tamu || "";
};

// 🔄 RESET
function resetForm() {
  editId = null;
  currentData = null;

  pria.value = "";
  wanita.value = "";
  tanggal.value = "";
  lokasi.value = "";
  tamu.value = "";
}
</script>

</body>
</html>
