<h2>Buat Undangan</h2>

<input id="pria" placeholder="Nama Pria">
<input id="wanita" placeholder="Nama Wanita">
<input id="tanggal" type="date">

<button onclick="buat()">Generate</button>

<p id="hasil"></p>

<script type="module">
import { createInvitation } from './firebase.js';
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const auth = getAuth();

// 🔐 PROTEKSI LOGIN
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
  }
});

// 🚀 FUNCTION GENERATE
window.buat = async function () {
  const pria = document.getElementById("pria").value;
  const wanita = document.getElementById("wanita").value;
  const tanggal = document.getElementById("tanggal").value;

  // VALIDASI
  if (!pria || !wanita || !tanggal) {
    alert("Semua field harus diisi");
    return;
  }

  const data = {
    pria,
    wanita,
    tanggal
  };

  const docRef = await createInvitation(data);

  document.getElementById("hasil").innerText =
    "Link: invitation.html?id=" + docRef.id;
};
</script>
