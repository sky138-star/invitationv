<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="themes.css">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Poppins&display=swap" rel="stylesheet">

</head>
<body class="theme-elegant">

<!-- ENVELOPE OPENING -->
<div id="envelope">
  <div class="flap"></div>
  <div class="letter">
    <p>Kepada Yth:</p>
    <h2 id="guest">Tamu Undangan</h2>
    <button onclick="openInvite()">Buka Undangan</button>
  </div>
</div>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop id="bg-video">
  <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
</video>

<!-- MAIN CONTENT -->
<div id="content" style="display:none">

<section class="fade">
  <h1>Andi & Sari</h1>
  <p>12 Desember 2026</p>
  <div id="countdown"></div>
</section>

<section class="fade">
  <h2>Gallery</h2>
  <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
</section>

<section class="fade">
  <h2>Ucapan</h2>
  <input id="nama" placeholder="Nama">
  <input id="pesan" placeholder="Ucapan">
  <button onclick="kirimUcapan()">Kirim</button>

  <div id="listUcapan"></div>
</section>

</div>

<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<script src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
