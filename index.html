<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pernikahan</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Poppins&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #fdf8f3;
  text-align: center;
}

h1,h2 {
  font-family: 'Playfair Display', serif;
}

.hero {
  height: 100vh;
  background: url('https://images.unsplash.com/photo-1519741497674-611481863552') center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
}

.overlay {
  background: rgba(0,0,0,0.5);
  padding: 30px;
  border-radius: 10px;
}

.button {
  background: #c9a96e;
  border: none;
  padding: 12px 25px;
  color: white;
  border-radius: 30px;
  cursor: pointer;
}

.section {
  padding: 50px 20px;
}

.fade {
  opacity: 0;
  transform: translateY(20px);
  transition: 1s;
}

.fade.show {
  opacity: 1;
  transform: translateY(0);
}

.gallery img {
  width: 90%;
  margin: 10px 0;
  border-radius: 10px;
}

.countdown {
  font-size: 20px;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- OPENING -->
<div class="hero">
  <div class="overlay">
    <p>Kepada Yth:</p>
    <h2 id="guest">JOKOWI</h2>
    <h1>Hansen & Ayu</h1>
    <button class="button" onclick="openInvite()">Buka Undangan</button>
  </div>
</div>

<!-- CONTENT -->
<div id="content" style="display:none">

<div class="section fade">
  <h2>Save The Date</h2>
  <p>12 Desember 2026</p>
  <div class="countdown" id="countdown"></div>
</div>

<div class="section fade">
  <h2>Lokasi</h2>
  <iframe src="https://maps.google.com/maps?q=jakarta&t=&z=13&ie=UTF8&iwloc=&output=embed"
  width="90%" height="250"></iframe>
</div>

<div class="section fade gallery">
  <h2>Gallery</h2>
  <img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
  <img src="https://images.unsplash.com/photo-1504208434309-cb69f4fe52b0">
  <img src="https://images.unsplash.com/photo-1529636798458-92182e662485">
</div>

<div class="section fade">
  <h2>RSVP</h2>
  <input type="text" id="nama" placeholder="Nama"><br>
  <select id="hadir">
    <option value="Hadir">Hadir</option>
    <option value="Tidak Hadir">Tidak Hadir</option>
  </select><br><br>
  <button class="button" onclick="kirimRSVP()">Kirim</button>
</div>

</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// PERSONALIZATION
const urlParams = new URLSearchParams(window.location.search);
const guestName = urlParams.get('to');
if (guestName) document.getElementById("guest").innerText = guestName;

// OPEN INVITE
function openInvite() {
  document.querySelector('.hero').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('music').play();

  document.querySelectorAll('.fade').forEach((el, i) => {
    setTimeout(() => el.classList.add('show'), i * 300);
  });
}

// COUNTDOWN
const targetDate = new Date("Dec 12, 2026 00:00:00").getTime();
setInterval(() => {
  const now = new Date().getTime();
  const gap = targetDate - now;

  const d = Math.floor(gap / (1000*60*60*24));
  const h = Math.floor((gap / (1000*60*60)) % 24);
  const m = Math.floor((gap / (1000*60)) % 60);

  document.getElementById("countdown").innerText =
    d + " hari " + h + " jam " + m + " menit";
}, 1000);

// RSVP WA
function kirimRSVP() {
  const nama = document.getElementById('nama').value;
  const hadir = document.getElementById('hadir').value;

  const text = `Halo, saya ${nama}, konfirmasi: ${hadir}`;
  const url = `https://wa.me/628123456789?text=${encodeURIComponent(text)}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
